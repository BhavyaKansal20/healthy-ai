{% extends 'base.html' %}
{% block title %}Sign In - Healthy AI{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;">
  <script>
    window.onload = () => {
      openModal('loginModal');
      const params = new URLSearchParams(window.location.search);
      if (params.get('verified') === '1') {
        showToast('Email verified. You can sign in now.', 'success');
      }
      {% if oauth_error %}
      showToast({{ oauth_error|tojson }}, 'error');
      {% endif %}
    };
  </script>
  <div style="text-align:center;">
    <div style="font-size:3rem;margin-bottom:16px;">🩺</div>
    <h2 style="font-size:1.5rem;font-weight:700;color:var(--muted);">Redirecting to login...</h2>
    <p style="color:var(--muted);margin-top:8px;"><a href="/" style="color:var(--cyan);">Go to homepage</a></p>
  </div>
</div>
{% endblock %}
